# ============================================================
# produits-service.yml — MS-02 : Catalogue produits (port 8082)
#
# Variables d'environnement :
#   SERVER_PORT         : port d'écoute          (défaut: 8082)
#   BDD_HOTE            : hôte PostgreSQL          (local: localhost | Docker: postgres-produits)
#   BDD_PORT            : port PostgreSQL           (défaut: 5432)
#   BDD_NOM             : nom de la base            (défaut: produits_db)
#   BDD_UTILISATEUR     : utilisateur PostgreSQL     (défaut: postgres)
#   BDD_MOT_DE_PASSE    : mot de passe PostgreSQL    (défaut: postgres)
#   ELASTICSEARCH_URI   : URI Elasticsearch          (local: http://localhost:9200 | Docker: http://elasticsearch:9200)
#   REDIS_HOST          : hôte Redis                 (local: localhost | Docker: redis)
#   REDIS_PORT          : port Redis                 (défaut: 6379)
#   SWAGGER_ENABLED     : activer Swagger UI          (défaut: true — mettre false en prod)
# ============================================================

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: produits-service

  datasource:
    url: jdbc:postgresql://${BDD_HOTE:localhost}:${BDD_PORT:5432}/${BDD_NOM:produits_db}
    username: ${BDD_UTILISATEUR:postgres}
    password: ${BDD_MOT_DE_PASSE:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Produits
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOTE:localhost}:${EUREKA_PORT:8761}/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: ${SWAGGER_ENABLED:true}
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  use-fqn: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: MS-02 – Service Produits
    version: 1.0.0
    description: Catalogue produits, catégories, favoris et recherche Elasticsearch

logging:
  level:
    root: INFO
    com.plateforme.produits: DEBUG
    org.springframework.data.elasticsearch: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
