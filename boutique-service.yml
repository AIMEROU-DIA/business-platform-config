# ============================================================
# boutique-service.yml — Configuration centralisée pour MS-03
# Dépôt : configurations-teranga-biz (GitHub)
#
# Ce fichier est distribué par le config-server à boutique-service
# au démarrage. Il complète application.yml.
#
# Fonctionnalités :
#   - Création et gestion des boutiques personnalisées des vendeurs
#   - Slug URL unique généré automatiquement
#   - Thèmes, couleurs, logo, bannière personnalisables
#   - Cycle de vie : EN_ATTENTE → ACTIVE → SUSPENDUE / FERMEE
#   - Maximum 3 boutiques par vendeur
# ============================================================

server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: boutique-service

  # ──────────────────────────────────────────────────────────
  # BASE DE DONNÉES — PostgreSQL dédié à boutique-service
  # ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${BDD_HOTE:postgres-boutiques}:${BDD_PORT:5432}/${BDD_NOM:boutiques_db}
    username: ${BDD_UTILISATEUR:postgres}
    password: ${BDD_MOT_DE_PASSE:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Boutiques
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ──────────────────────────────────────────────────────────
  # JPA / HIBERNATE
  # ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # ──────────────────────────────────────────────────────────
  # FLYWAY — Migrations automatiques
  # ──────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas: public

# ──────────────────────────────────────────────────────────
# EUREKA CLIENT
# ──────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOTE:eureka-server}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ──────────────────────────────────────────────────────────
# SPRINGDOC OPENAPI / SWAGGER
# Accessible via : http://localhost:8083/swagger-ui/index.html
# ──────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  use-fqn: false

# ──────────────────────────────────────────────────────────
# ACTUATOR
# ──────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: MS-03 – Service Boutiques
    version: 1.0.0
    description: Création et gestion des mini-boutiques personnalisées des vendeurs

# ──────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────
logging:
  level:
    com.plateforme.boutiques: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
