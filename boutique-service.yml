# ============================================================
# boutique-service.yml — MS-03 : Boutiques personnalisées (port 8083)
#
# Variables d'environnement :
#   SERVER_PORT       : port d'écoute        (défaut: 8083)
#   BDD_HOTE          : hôte PostgreSQL       (local: localhost | Docker: postgres-boutiques)
#   BDD_PORT          : port PostgreSQL        (défaut: 5432)
#   BDD_NOM           : nom de la base         (défaut: boutiques_db)
#   BDD_UTILISATEUR   : utilisateur PostgreSQL  (défaut: postgres)
#   BDD_MOT_DE_PASSE  : mot de passe PostgreSQL (défaut: postgres)
#   SWAGGER_ENABLED   : activer Swagger UI      (défaut: true — mettre false en prod)
# ============================================================

server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: boutique-service

  datasource:
    url: jdbc:postgresql://${BDD_HOTE:localhost}:${BDD_PORT:5432}/${BDD_NOM:boutiques_db}
    username: ${BDD_UTILISATEUR:postgres}
    password: ${BDD_MOT_DE_PASSE:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Boutiques
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas: public

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOTE:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: ${SWAGGER_ENABLED:true}
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  use-fqn: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: MS-03 – Service Boutiques
    version: 1.0.0
    description: Création et gestion des mini-boutiques personnalisées des vendeurs

logging:
  level:
    com.plateforme.boutiques: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
