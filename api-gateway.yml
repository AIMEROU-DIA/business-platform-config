# ============================================================
# api-gateway.yml — Routeur central + validation JWT (port 8080)
#
# Variables d'environnement :
#   JWT_SECRET            : clé secrète JWT (OBLIGATOIRE — même valeur que utilisateur-service)
#   SERVER_PORT           : port d'écoute (défaut: 8080)
#
# CORS en production :
#   Décommenter les lignes du domaine de production dans la section globalcors
#
# AJOUTER UN MICROSERVICE :
#   1. Ajouter un bloc dans la section routes
#   2. Pousser sur GitHub — rechargement automatique sans rebuild
# ============================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # Crée automatiquement une route /nom-service/** pour chaque service Eureka
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        # MS-01 — Authentification (endpoints publics)
        - id: utilisateur-service-auth
          uri: lb://utilisateur-service
          predicates:
            - Path=/api/auth/**
          order: 1

        # MS-01 — Profils & gestion des utilisateurs
        - id: utilisateur-service-users
          uri: lb://utilisateur-service
          predicates:
            - Path=/api/utilisateurs/**
          order: 2

        # MS-01 — Administration (ADMIN / SUPER_ADMIN)
        - id: utilisateur-service-admin
          uri: lb://utilisateur-service
          predicates:
            - Path=/api/admin/**
          order: 3

        # MS-02 — Produits, Catégories, Favoris, Recherche
        - id: produits-service
          uri: lb://produits-service
          predicates:
            - Path=/api/produits/**,/api/categories/**,/api/favoris/**,/api/recherche/**
          order: 4

        # MS-02 — Images produits (fichiers statiques)
        - id: produits-service-images
          uri: lb://produits-service
          predicates:
            - Path=/images/**
          order: 4

        # MS-03 — Boutiques
        - id: boutique-service
          uri: lb://boutique-service
          predicates:
            - Path=/api/boutiques/**
          order: 5

        # MS-04 — Inventaire
        - id: inventaire-service
          uri: lb://inventaire-service
          predicates:
            - Path=/api/inventaire/**
          order: 6

        # MS-05 — Commandes
        - id: commandes-service
          uri: lb://commandes-service
          predicates:
            - Path=/api/commandes/**
          order: 7

        # MS-06 — Paiements
        - id: paiements-service
          uri: lb://paiements-service
          predicates:
            - Path=/api/paiements/**
          order: 8

        # MS-12 — Avis & Évaluations
        - id: avis-service
          uri: lb://avis-service
          predicates:
            - Path=/api/avis/**
          order: 9

      # ── CORS — Frontend React ────────────────────────────────
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - 'http://localhost:*'
              - 'http://127.0.0.1:*'
              # Production — décommenter avec le vrai domaine :
              # - 'https://teranga-biz.com'
              # - 'https://www.teranga-biz.com'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: '*'
            allowCredentials: true
            maxAge: 3600
            exposedHeaders:
              - Authorization
              - Content-Type

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

# ── Sécurité JWT ─────────────────────────────────────────────
# La gateway valide le JWT une seule fois et injecte :
#   X-User-Id, X-User-Phone, X-User-Roles, X-User-Permissions
# Les microservices lisent ces headers via commun-securite.
application:
  securite:
    jwt:
      cle-secrete: ${JWT_SECRET}
      routes-publiques:
        /api/auth/inscription,
        /api/auth/inscription/verifier-otp,
        /api/auth/inscription/renvoyer-otp,
        /api/auth/connexion,
        /api/auth/jeton-rafraichissement,
        /api/auth/mot-de-passe-oublie,
        /api/auth/reinitialiser-mot-de-passe,
        /api/produits,
        /api/categories,
        /api/categories/**,
        /api/recherche/**,
        /images/**,
        /api/boutiques,
        /api/boutiques/recherche,
        /api/boutiques/slug/**,
        /actuator/**

logging:
  level:
    com.plateforme.gateway: DEBUG
