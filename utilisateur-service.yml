# Configuration Utilisateur Service - Teranga Biz Platform
# À placer dans le dépôt GitHub : configurations-teranga-biz/utilisateur-service.yml

server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: utilisateur-service

  # ===== BASE DE DONNÉES =====
  datasource:
    url: jdbc:postgresql://${BDD_HOTE:postgres-utilisateurs}:${BDD_PORT:5432}/${BDD_NOM:utilisateurs_db}
    username: ${BDD_UTILISATEUR:postgres}
    password: ${BDD_MOT_DE_PASSE:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: HikariPool-Utilisateurs

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  # ===== FLYWAY – migrations automatiques =====
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # ===== EMAIL – Configuration SMTP =====
  # Pour PRODUCTION, utilisez un service SMTP professionnel :
  # - SendGrid (recommandé) : https://sendgrid.com
  # - AWS SES : https://aws.amazon.com/ses
  # - Mailgun : https://www.mailgun.com
  # - Brevo (ex-Sendinblue) : https://www.brevo.com
  # 
  # Pour DÉVELOPPEMENT : les emails s'affichent dans les logs
  mail:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:apikey}  # Pour SendGrid, toujours "apikey"
    password: ${SMTP_PASSWORD:}  # Votre clé API SendGrid
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        from: ${EMAIL_FROM:noreply@teranga-biz.com}
        test-connection: false  # false en dev pour éviter erreurs au démarrage

# ===== SPRINGDOC OPENAPI / SWAGGER =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  use-fqn: false

# ===== EUREKA – enregistrement du service =====
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOTE:eureka-server}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false  # Désactive le healthcheck SMTP en dev
  info:
    env:
      enabled: true

info:
  app:
    name: MS-01 – Service Utilisateurs
    version: 1.0.0
    description: Gestion des comptes, authentification, rôles et profils

# ===== JWT =====
application:
  securite:
    jwt:
      cle-secrete: ${JWT_CLE_SECRETE:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration-jeton-acces: 900000
      expiration-jeton-rafraichissement: 604800000

  # ===== OTP =====
  otp:
    duree-validite-minutes: 5
    longueur: 6
    tentatives-max: 3
    # MODE DEV : affiche l'OTP dans les logs au lieu d'envoyer un SMS
    fournisseur: ${OTP_FOURNISSEUR:email}

  # ===== TWILIO (MODE PRODUCTION - commenté pour dev) =====
  # Décommenter et configurer pour l'environnement de production
  # twilio:
  #   compte-sid: ${TWILIO_COMPTE_SID:}
  #   jeton-auth: ${TWILIO_JETON_AUTH:}
  #   numero-expediteur: ${TWILIO_NUMERO:}

# ===== LOGS =====
logging:
  level:
    com.plateforme.utilisateurs: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
