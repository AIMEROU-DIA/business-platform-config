# ============================================================
# application.yml — Config commune à TOUS les microservices
#
# Ce fichier est chargé automatiquement avant la config propre
# de chaque service. Y mettre uniquement ce qui est partagé.
#
# Variables d'environnement :
#   EUREKA_HOTE  : hôte Eureka   (local: localhost | Docker: eureka-server)
#   EUREKA_PORT  : port Eureka   (défaut: 8761)
# ============================================================

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOTE:localhost}:${EUREKA_PORT:8761}/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.plateforme: DEBUG
    org.springframework.security: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
