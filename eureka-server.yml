# ============================================================
# eureka-server.yml — Registre de découverte de services (port 8761)
#
# Variables d'environnement :
#   SERVER_PORT      : port d'écoute (défaut: 8761)
#   EUREKA_HOSTNAME  : nom d'hôte du serveur Eureka
#                      (local: localhost | Docker: eureka-server)
# ============================================================

server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    # Eureka ne s'enregistre pas chez lui-même
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
    wait-time-in-ms-when-sync-empty: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
